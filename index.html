<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItemMaster | AI 雲端庫存</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 tracking-tight">ItemMaster</h1>
            <button onclick="toggleModal('settings-modal')" class="p-2 hover:bg-gray-100 rounded-full text-lg">⚙️</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <!-- Tab: Scan -->
        <div id="scan-view" class="space-y-6">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                <div id="image-preview-container" class="hidden mb-4">
                    <img id="image-preview" src="#" class="w-full h-64 object-cover rounded-xl shadow-inner border border-gray-100">
                </div>
                <div id="upload-placeholder" class="border-2 border-dashed border-gray-200 rounded-xl py-12 mb-4 text-gray-400">
                    📸 拍照或上傳物品照片
                </div>
                <label class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl cursor-pointer transition-all shadow-md active:scale-95">
                    <span>📷 開始掃描</span>
                    <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                </label>
                <button id="analyze-btn" onclick="analyzeImage()" class="hidden w-full mt-3 bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-md transition-all active:scale-95">✨ AI 辨識物品</button>
            </section>

            <div id="loading" class="hidden flex flex-col items-center py-10">
                <div class="loader rounded-full border-4 h-12 w-12 mb-4"></div>
                <p class="text-gray-600 font-medium">Gemini 正在分析照片...</p>
            </div>

            <!-- AI Form -->
            <section id="form-section" class="hidden space-y-4">
                <div class="flex justify-between items-center px-1">
                    <h2 class="text-lg font-bold text-gray-800">確認資訊</h2>
                    <button onclick="addItemCard()" class="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold">+ 手動新增</button>
                </div>
                <div id="items-list" class="space-y-4"></div>
                <button onclick="saveToSupabase()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg mt-6 active:scale-95">☁️ 儲存至雲端</button>
            </section>
        </div>

        <!-- Tab: Inventory -->
        <div id="inventory-view" class="hidden space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-lg font-bold text-gray-800">雲端庫存</h2>
                <button onclick="fetchInventory()" class="text-blue-600 text-sm font-bold">🔄 刷新</button>
            </div>
            <div id="inventory-list" class="space-y-3 pb-10">
                <!-- Data goes here -->
            </div>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center py-3 z-30 shadow-2xl">
        <button onclick="switchTab('scan')" id="nav-scan" class="flex flex-col items-center flex-1 text-blue-600">
            <span class="text-2xl">📷</span><span class="text-[10px] mt-1 font-bold">掃描</span>
        </button>
        <button onclick="switchTab('inventory')" id="nav-inventory" class="flex flex-col items-center flex-1 text-gray-400">
            <span class="text-2xl">📦</span><span class="text-[10px] mt-1 font-bold">庫存</span>
        </button>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 space-y-4 shadow-2xl">
            <h3 class="text-xl font-bold border-b pb-2">系統設定</h3>
            
            <div class="space-y-4">
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase">Gemini API Key</label>
                        <button onclick="showTutorial('gemini')" class="text-blue-500 hover:text-blue-700 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    </div>
                    <input type="password" id="gemini-key" placeholder="貼上您的 API Key" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <hr>
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase">Supabase URL</label>
                        <button onclick="showTutorial('supabase')" class="text-blue-500 hover:text-blue-700 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    </div>
                    <input type="text" id="supabase-url" placeholder="https://xxx.supabase.co" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase">Supabase Anon Key</label>
                        <button onclick="showTutorial('supabase')" class="text-blue-500 hover:text-blue-700 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    </div>
                    <input type="password" id="supabase-key" placeholder="貼上 Anon Key" class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="flex space-x-2 pt-2">
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl font-bold">儲存</button>
                <button onclick="toggleModal('settings-modal')" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-xl font-bold">關閉</button>
            </div>
        </div>
    </div>

    <!-- Tutorial Modal -->
    <div id="tutorial-modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-6 z-[60] backdrop-blur-md">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
            <div id="tutorial-content" class="p-6 space-y-4">
                <!-- Content injected by JS -->
            </div>
            <button onclick="toggleModal('tutorial-modal')" class="w-full bg-gray-50 py-4 font-bold text-blue-600 border-t hover:bg-gray-100 transition-colors">知道了</button>
        </div>
    </div>

    <script>
        let supabaseClient = null;
        let base64Image = "";

        // On Load
        window.onload = () => {
            const config = {
                gemini: localStorage.getItem('GEMINI_API_KEY'),
                url: localStorage.getItem('SB_URL'),
                key: localStorage.getItem('SB_KEY')
            };

            document.getElementById('gemini-key').value = config.gemini || '';
            document.getElementById('supabase-url').value = config.url || '';
            document.getElementById('supabase-key').value = config.key || '';

            if (config.url && config.key) {
                try {
                    supabaseClient = supabase.createClient(config.url, config.key);
                } catch (e) {
                    console.error("Supabase Init Error", e);
                }
            }
            switchTab('scan');
        };

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        function showTutorial(type) {
            const content = document.getElementById('tutorial-content');
            if (type === 'gemini') {
                content.innerHTML = `
                    <div class="text-center"><span class="text-4xl">♊</span></div>
                    <h4 class="text-xl font-bold text-center">取得 Gemini API Key</h4>
                    <ul class="text-sm text-gray-600 space-y-3 pt-2">
                        <li>1. 前往 <a href="https://aistudio.google.com/" target="_blank" class="text-blue-600 underline font-bold">Google AI Studio</a></li>
                        <li>2. 點擊左側選單的 <strong>「Get API key」</strong></li>
                        <li>3. 點擊 <strong>「Create API key」</strong> 並複製那一串長金鑰。</li>
                    </ul>
                `;
            } else if (type === 'supabase') {
                content.innerHTML = `
                    <div class="text-center"><span class="text-4xl">⚡</span></div>
                    <h4 class="text-xl font-bold text-center">取得 Supabase 金鑰</h4>
                    <ul class="text-sm text-gray-600 space-y-3 pt-2">
                        <li>1. 登入 <a href="https://supabase.com/dashboard" target="_blank" class="text-green-600 underline font-bold">Supabase 後台</a> 並進入專案。</li>
                        <li>2. 點選左下角 <strong>⚙️ Project Settings</strong>。</li>
                        <li>3. 進入 <strong>API</strong> 選項。</li>
                        <li>4. 複製 <strong>Project URL</strong> 與 <strong>\`anon\` \`public\`</strong> API Key。</li>
                    </ul>
                `;
            }
            toggleModal('tutorial-modal');
        }

        function saveSettings() {
            localStorage.setItem('GEMINI_API_KEY', document.getElementById('gemini-key').value);
            localStorage.setItem('SB_URL', document.getElementById('supabase-url').value);
            localStorage.setItem('SB_KEY', document.getElementById('supabase-key').value);
            location.reload();
        }

        function switchTab(tab) {
            const isScan = tab === 'scan';
            document.getElementById('scan-view').classList.toggle('hidden', !isScan);
            document.getElementById('inventory-view').classList.toggle('hidden', isScan);
            document.getElementById('nav-scan').className = isScan ? 'flex flex-col items-center flex-1 text-blue-600' : 'flex flex-col items-center flex-1 text-gray-400';
            document.getElementById('nav-inventory').className = !isScan ? 'flex flex-col items-center flex-1 text-blue-600' : 'flex flex-col items-center flex-1 text-gray-400';
            if (!isScan) fetchInventory();
        }

        function resetScan() {
            base64Image = "";
            document.getElementById('image-input').value = "";
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            document.getElementById('analyze-btn').classList.add('hidden');
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('items-list').innerHTML = '';
        }

        function startManualAdd() {
            resetScan();
            document.getElementById('upload-placeholder').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            addItemCard();
        }

        // --- Camera & AI ---
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result.split(',')[1];
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                document.getElementById('analyze-btn').classList.remove('hidden');
                document.getElementById('form-section').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function analyzeImage() {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            if (!apiKey) { toggleModal('settings-modal'); return; }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('analyze-btn').classList.add('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "辨識圖片中的物品。請使用「繁體中文」命名物品。輸出的 JSON 格式必須嚴格遵守: {\"items\": [{\"name\": \"物品名稱\"}]}" },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]}]
                    })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "API Error");

                const text = data.candidates[0].content.parts[0].text;
                const jsonStart = text.indexOf('{');
                const jsonEnd = text.lastIndexOf('}');
                const result = JSON.parse(text.substring(jsonStart, jsonEnd + 1));
                
                const list = document.getElementById('items-list');
                list.innerHTML = '';
                result.items.forEach(i => list.appendChild(createItemCard(i.name)));
                document.getElementById('form-section').classList.remove('hidden');
                document.getElementById('form-section').scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert("辨識失敗：" + e.message);
                document.getElementById('analyze-btn').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function createItemCard(name = "") {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-3 item-card relative";
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 p-1">✕</button>
                <input type="text" value="${name}" class="item-name font-bold text-gray-800 w-full border-none p-0 text-lg bg-transparent focus:ring-0" placeholder="物品名稱">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">到期日</label>
                        <input type="date" class="item-expiry w-full border-gray-200 rounded-lg text-sm px-2 py-1 outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase">存放地點</label>
                        <input type="text" placeholder="冰箱、櫃子..." class="item-location w-full border-gray-200 rounded-lg text-sm px-2 py-1 outline-none focus:border-blue-500">
                    </div>
                </div>
            `;
            return div;
        }

        function addItemCard() { document.getElementById('items-list').appendChild(createItemCard()); }

        // --- Supabase Operations ---
        async function saveToSupabase() {
            if (!supabaseClient) { alert("請先完成 Supabase 設定"); toggleModal('settings-modal'); return; }

            const cards = document.querySelectorAll('.item-card');
            if (cards.length === 0) return;

            const items = Array.from(cards).map(c => ({
                name: c.querySelector('.item-name').value,
                expiry: c.querySelector('.item-expiry').value || null,
                location: c.querySelector('.item-location').value || '未標註'
            }));

            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "儲存中...";

            try {
                const { error } = await supabaseClient.from('inventory').insert(items);
                if (error) throw error;

                alert("儲存成功！");
                document.getElementById('form-section').classList.add('hidden');
                document.getElementById('image-preview-container').classList.add('hidden');
                document.getElementById('upload-placeholder').classList.remove('hidden');
                document.getElementById('image-input').value = "";
                switchTab('inventory');
            } catch (e) {
                alert("儲存失敗：" + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        async function fetchInventory() {
            if (!supabaseClient) return;

            const list = document.getElementById('inventory-list');
            list.innerHTML = '<div class="text-center py-10"><div class="loader rounded-full border-4 h-8 w-8 inline-block"></div><p class="text-xs text-gray-400 mt-2">連線中...</p></div>';

            try {
                const { data, error } = await supabaseClient
                    .from('inventory')
                    .select('*')
                    .order('expiry', { ascending: true, nullsFirst: false });

                if (error) throw error;

                list.innerHTML = data.length ? '' : '<p class="text-center text-gray-400 py-20 bg-white rounded-2xl border border-dashed">這裡空空如也 📦</p>';
                
                data.forEach(item => {
                    const isExpired = item.expiry && new Date(item.expiry) < new Date().setHours(0,0,0,0);
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center animate-fade-in";
                    div.innerHTML = `
                        <div class="flex-1">
                            <div class="font-bold text-gray-800">${item.name}</div>
                            <div class="text-[11px] text-gray-400 mt-0.5 flex items-center">
                                <span class="bg-gray-100 px-1.5 rounded mr-2">📍 ${item.location}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="${isExpired ? 'text-red-500 font-bold' : 'text-gray-500'} text-xs">${item.expiry || '∞ 無到期日'}</div>
                            <button onclick="deleteItem(${item.id})" class="text-[10px] text-gray-300 hover:text-red-400 mt-1 transition-colors">刪除</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                list.innerHTML = `<p class="text-center text-red-500 py-10 font-bold">連線失敗<br><span class="text-xs font-normal">${e.message}</span></p>`;
            }
        }

        async function deleteItem(id) {
            if (!confirm("確定刪除嗎？")) return;
            try {
                const { error } = await supabaseClient.from('inventory').delete().eq('id', id);
                if (error) throw error;
                fetchInventory();
            } catch (e) {
                alert("刪除失敗：" + e.message);
            }
        }
    </script>
</body>
</html>
