<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItemMaster | AI 雲端庫存</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24 font-sans text-gray-900 text-[16px]">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 tracking-tight">ItemMaster</h1>
            <button onclick="toggleModal('settings-modal')" class="p-2 hover:bg-gray-100 rounded-full text-lg">⚙️</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        
        <!-- Tab: Scan -->
        <div id="scan-view" class="space-y-6">
            <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center">
                <div id="image-preview-container" class="hidden mb-4">
                    <img id="image-preview" src="#" class="w-full h-64 object-cover rounded-2xl shadow-inner border border-gray-100">
                </div>
                <div id="upload-placeholder" class="border-2 border-dashed border-gray-200 rounded-2xl py-12 mb-4 text-gray-400 font-medium">
                    📸 拍照或上傳物品照片
                </div>
                
                <div id="action-buttons" class="space-y-3">
                    <label id="start-scan-label" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl cursor-pointer transition-all shadow-md active:scale-95">
                        <span>📷 拍攝照片</span>
                        <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                    </label>
                    
                    <button id="direct-manual-btn" onclick="startManualAdd()" class="w-full py-3 text-blue-600 font-bold border-2 border-blue-100 rounded-2xl hover:bg-blue-50 transition-colors">
                        ✍️ 直接手動新增 (不拍照)
                    </button>

                    <button id="analyze-btn" onclick="analyzeImage()" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-md transition-all active:scale-95">✨ AI 辨識物品</button>
                    
                    <button id="skip-ai-btn" onclick="startManualAddWithPhoto()" class="hidden w-full py-3 text-gray-600 font-bold border-2 border-gray-200 rounded-2xl hover:bg-gray-50 transition-colors">
                        ✍️ 略過辨識，手動輸入
                    </button>
                </div>
            </section>

            <div id="loading" class="hidden flex flex-col items-center py-10">
                <div class="loader rounded-full border-4 h-12 w-12 mb-4 border-blue-500 border-t-transparent"></div>
                <p class="text-gray-600 font-bold">Gemini 正在分析照片...</p>
            </div>

            <!-- AI Form -->
            <section id="form-section" class="hidden space-y-4">
                <div class="flex justify-between items-center px-1">
                    <div class="flex flex-col">
                        <h2 class="text-lg font-bold text-gray-800 leading-tight">確認資訊</h2>
                        <button onclick="resetScan()" class="text-[11px] text-red-500 font-bold text-left hover:underline">✕ 放棄並重新開始</button>
                    </div>
                    <button onclick="addItemCard()" class="text-sm bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full font-bold shadow-sm active:scale-95 transition-all">+ 手動新增</button>
                </div>
                <div id="items-list" class="space-y-4"></div>
                <button id="submit-cloud-btn" onclick="saveToSupabase()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg mt-6 active:scale-95 transition-all">☁️ 儲存至雲端</button>
            </section>
        </div>

        <!-- Tab: Inventory -->
        <div id="inventory-view" class="hidden space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-lg font-bold text-gray-800">雲端庫存清單</h2>
                <button onclick="fetchInventory()" class="text-blue-600 text-sm font-bold active:scale-95">🔄 刷新</button>
            </div>
            <div id="inventory-list" class="space-y-3 pb-10"></div>
        </div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center py-3 z-30 shadow-[0_-5px_15px_-3px_rgba(0,0,0,0.1)]">
        <button onclick="switchTab('scan')" id="nav-scan" class="flex flex-col items-center flex-1 text-blue-600 transition-all">
            <span class="text-2xl">📷</span><span class="text-[10px] mt-1 font-bold">掃描</span>
        </button>
        <button onclick="switchTab('inventory')" id="nav-inventory" class="flex flex-col items-center flex-1 text-gray-400 transition-all">
            <span class="text-2xl">📦</span><span class="text-[10px] mt-1 font-bold">庫存</span>
        </button>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 class="text-xl font-bold border-b pb-3">系統設定</h3>
            <div class="space-y-4">
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase">Gemini API Key</label>
                        <button onclick="showTutorial('gemini')" class="text-blue-500 hover:text-blue-700 p-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    </div>
                    <input type="password" id="gemini-key" placeholder="貼上您的 API Key" class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 border-gray-200">
                </div>
                <hr class="border-gray-100">
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase">Supabase URL</label>
                        <button onclick="showTutorial('supabase')" class="text-blue-500 hover:text-blue-700 p-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    </div>
                    <input type="text" id="supabase-url" placeholder="https://xxx.supabase.co" class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 border-gray-200">
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase">Supabase Anon Key</label>
                        <button onclick="showTutorial('supabase')" class="text-blue-500 hover:text-blue-700 p-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </button>
                    </div>
                    <input type="password" id="supabase-key" placeholder="貼上 Anon Key" class="w-full border rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 border-gray-200">
                </div>
            </div>
            <div class="flex space-x-2 pt-3">
                <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-3.5 rounded-2xl font-bold active:scale-95 transition-all shadow-md shadow-blue-200">儲存</button>
                <button onclick="toggleModal('settings-modal')" class="flex-1 bg-gray-100 text-gray-700 py-3.5 rounded-2xl font-bold active:scale-95 transition-all">關閉</button>
            </div>
        </div>
    </div>

    <!-- Tutorial Modal -->
    <div id="tutorial-modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-6 z-[60] backdrop-blur-md">
        <div class="bg-white rounded-[2rem] w-full max-w-sm overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div id="tutorial-content" class="p-6 space-y-4 overflow-y-auto"></div>
            <button onclick="toggleModal('tutorial-modal')" class="w-full bg-gray-50 py-5 font-bold text-blue-600 border-t hover:bg-gray-100 transition-colors">我已完成設定</button>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="image-modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-4 z-[70] backdrop-blur-sm" onclick="toggleModal('image-modal')">
        <img id="modal-img" src="" class="max-w-full max-h-full rounded-lg shadow-2xl transition-transform duration-300 scale-100">
        <div class="absolute top-8 right-8 text-white text-3xl">✕</div>
    </div>

    <script>
        let supabaseClient = null;
        let base64Image = "";

        window.onload = () => {
            const config = {
                gemini: localStorage.getItem('GEMINI_API_KEY'),
                url: localStorage.getItem('SB_URL'),
                key: localStorage.getItem('SB_KEY')
            };
            document.getElementById('gemini-key').value = config.gemini || '';
            document.getElementById('supabase-url').value = config.url || '';
            document.getElementById('supabase-key').value = config.key || '';
            if (config.url && config.key) {
                try {
                    supabaseClient = supabase.createClient(config.url, config.key);
                } catch(e) { console.error("Client Init Error", e); }
            }
            switchTab('scan');
        };

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        function showTutorial(type) {
            const content = document.getElementById('tutorial-content');
            if (type === 'gemini') {
                content.innerHTML = `
                    <div class="text-center text-4xl mb-2">♊</div>
                    <h4 class="text-xl font-bold text-center">取得 Gemini API Key</h4>
                    <ul class="text-sm text-gray-600 space-y-4 pt-2">
                        <li>1. 前往 <a href="https://aistudio.google.com/" target="_blank" class="text-blue-600 underline font-bold">Google AI Studio</a></li>
                        <li>2. 點擊左側 <strong>「Get API key」</strong></li>
                        <li>3. 建立並複製那一串金鑰貼回設定。</li>
                    </ul>`;
            } else if (type === 'supabase') {
                content.innerHTML = `
                    <div class="text-center text-4xl mb-2">⚡</div>
                    <h4 class="text-xl font-bold text-center">Supabase 資料庫設定</h4>
                    <div class="space-y-4 pt-2 text-xs">
                        <section>
                            <h5 class="font-bold text-blue-600 mb-1">1. 建立資料表 (SQL Editor)</h5>
                            <pre class="bg-gray-100 p-3 rounded-xl text-[9px] overflow-x-auto font-mono text-gray-700">
CREATE TABLE inventory (
  id bigserial PRIMARY KEY,
  name text NOT NULL,
  expiry date,
  location text,
  image_url text,
  created_at timestamptz DEFAULT now()
);</pre>
                        </section>
                        <section>
                            <h5 class="font-bold text-blue-600 mb-1">2. 開啟讀寫權限 (修復 401 錯誤)</h5>
                            <p class="text-gray-500 mb-2">請在 SQL Editor 執行此指令：</p>
                            <pre class="bg-blue-50 p-3 rounded-xl text-[9px] overflow-x-auto font-mono text-blue-800 font-bold border border-blue-100">
ALTER TABLE inventory ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public Full Access" ON inventory FOR ALL TO anon USING (true) WITH CHECK (true);</pre>
                        </section>
                        <section>
                            <h5 class="font-bold text-blue-600 mb-1">3. 照片儲存 (Storage)</h5>
                            <p class="text-gray-500">1. 到 Storage 建立 <strong>item-photos</strong> Bucket (設為 Public)。</p>
                            <p class="text-gray-500 mt-1">2. 執行以下指令修復 400 錯誤：</p>
                            <pre class="bg-gray-100 p-3 rounded-xl text-[9px] overflow-x-auto font-mono text-gray-700">
CREATE POLICY "Allow Public" ON storage.objects FOR ALL TO anon USING (bucket_id = 'item-photos');</pre>
                        </section>
                    </div>`;
            }
            toggleModal('tutorial-modal');
        }

        function saveSettings() {
            localStorage.setItem('GEMINI_API_KEY', document.getElementById('gemini-key').value);
            localStorage.setItem('SB_URL', document.getElementById('supabase-url').value);
            localStorage.setItem('SB_KEY', document.getElementById('supabase-key').value);
            location.reload();
        }

        function switchTab(tab) {
            const isScan = tab === 'scan';
            document.getElementById('scan-view').classList.toggle('hidden', !isScan);
            document.getElementById('inventory-view').classList.toggle('hidden', isScan);
            document.getElementById('nav-scan').className = isScan ? 'flex flex-col items-center flex-1 text-blue-600 transition-all' : 'flex flex-col items-center flex-1 text-gray-400';
            document.getElementById('nav-inventory').className = !isScan ? 'flex flex-col items-center flex-1 text-blue-600 transition-all' : 'flex flex-col items-center flex-1 text-gray-400';
            if (!isScan) fetchInventory();
        }

        function resetScan() {
            base64Image = "";
            const input = document.getElementById('image-input');
            if (input) input.value = "";
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            document.getElementById('analyze-btn').classList.add('hidden');
            document.getElementById('skip-ai-btn').classList.add('hidden');
            document.getElementById('direct-manual-btn').classList.remove('hidden');
            document.getElementById('start-scan-label').classList.remove('hidden');
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('items-list').innerHTML = '';
        }

        function startManualAdd() {
            resetScan();
            document.getElementById('upload-placeholder').classList.add('hidden');
            document.getElementById('start-scan-label').classList.add('hidden');
            document.getElementById('direct-manual-btn').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            addItemCard();
        }

        function startManualAddWithPhoto() {
            document.getElementById('analyze-btn').classList.add('hidden');
            document.getElementById('skip-ai-btn').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            addItemCard();
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result.split(',')[1];
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
                document.getElementById('analyze-btn').classList.remove('hidden');
                document.getElementById('skip-ai-btn').classList.remove('hidden');
                document.getElementById('direct-manual-btn').classList.add('hidden');
                document.getElementById('form-section').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        async function analyzeImage() {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            if (!apiKey) { toggleModal('settings-modal'); return; }
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('analyze-btn').classList.add('hidden');
            document.getElementById('skip-ai-btn').classList.add('hidden');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "辨識圖片中的物品。請使用「繁體中文」命名物品。輸出的 JSON 格式必須嚴格遵守: {\"items\": [{\"name\": \"物品名稱\"}]}" },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]}]
                    })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error?.message || "Gemini API 錯誤");
                const text = data.candidates[0].content.parts[0].text;
                const jsonStart = text.indexOf('{');
                const jsonEnd = text.lastIndexOf('}');
                const result = JSON.parse(text.substring(jsonStart, jsonEnd + 1));
                const list = document.getElementById('items-list');
                list.innerHTML = '';
                result.items.forEach(i => list.appendChild(createItemCard(i.name)));
                document.getElementById('form-section').classList.remove('hidden');
                document.getElementById('form-section').scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                alert("辨識失敗：" + e.message);
                document.getElementById('analyze-btn').classList.remove('hidden');
                document.getElementById('skip-ai-btn').classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function createItemCard(name = "") {
            const div = document.createElement('div');
            div.className = "bg-white p-5 rounded-3xl border border-gray-100 shadow-sm space-y-4 item-card relative animate-fade-in";
            div.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 p-1">✕</button>
                <input type="text" value="${name}" class="item-name font-black text-gray-800 w-full border-none p-0 text-xl bg-transparent focus:ring-0" placeholder="輸入物品名稱">
                <div class="grid grid-cols-2 gap-4 border-t border-gray-50 pt-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">到期日</label>
                        <input type="date" class="item-expiry w-full border-none rounded-xl text-sm px-3 py-2.5 outline-none bg-gray-50 focus:bg-blue-50 transition-colors">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">存放地點</label>
                        <input type="text" placeholder="例：冷藏室" class="item-location w-full border-none rounded-xl text-sm px-3 py-2.5 outline-none bg-gray-50 focus:bg-blue-50 transition-colors">
                    </div>
                </div>`;
            return div;
        }

        function addItemCard() { document.getElementById('items-list').appendChild(createItemCard()); }

        async function saveToSupabase() {
            if (!supabaseClient) { alert("請先完成 Supabase 設定"); toggleModal('settings-modal'); return; }
            const cards = document.querySelectorAll('.item-card');
            if (cards.length === 0) return;
            const btn = document.getElementById('submit-cloud-btn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "⏳ 正在同步雲端...";
            try {
                let uploadedImageUrl = null;
                if (base64Image) {
                    const fileName = `${Date.now()}.jpg`;
                    const blob = await (await fetch(`data:image/jpeg;base64,${base64Image}`)).blob();
                    const { error: uploadError } = await supabaseClient.storage.from('item-photos').upload(fileName, blob, { contentType: 'image/jpeg' });
                    if (uploadError) throw new Error(`照片上傳失敗：${uploadError.message}`);
                    const { data: urlData } = supabaseClient.storage.from('item-photos').getPublicUrl(fileName);
                    uploadedImageUrl = urlData.publicUrl;
                }
                const items = Array.from(cards).map(c => ({
                    name: c.querySelector('.item-name').value,
                    expiry: c.querySelector('.item-expiry').value || null,
                    location: c.querySelector('.item-location').value || '未標註',
                    image_url: uploadedImageUrl
                }));
                const { error: dbError } = await supabaseClient.from('inventory').insert(items);
                if (dbError) {
                    throw new Error(`資料庫寫入失敗！\n代碼：${dbError.code}\n訊息：${dbError.message}\n詳情：${dbError.details || '無'}`);
                }
                alert("儲存成功！");
                resetScan();
                switchTab('inventory');
            } catch (e) {
                alert(e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        async function fetchInventory() {
            if (!supabaseClient) return;
            const list = document.getElementById('inventory-list');
            list.innerHTML = '<div class="text-center py-10"><div class="loader rounded-full border-4 h-8 w-8 inline-block border-blue-500 border-t-transparent"></div><p class="text-xs text-gray-400 mt-2 font-medium">連線雲端中...</p></div>';
            try {
                const { data, error } = await supabaseClient.from('inventory').select('*').order('expiry', { ascending: true, nullsFirst: false });
                if (error) throw error;
                list.innerHTML = data.length ? '' : '<p class="text-center text-gray-400 py-24 bg-white rounded-[2rem] border border-dashed border-gray-200">清單空空如也 📦</p>';
                data.forEach(item => {
                    const isExpired = item.expiry && new Date(item.expiry) < new Date().setHours(0,0,0,0);
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-[1.5rem] shadow-sm border border-gray-100 flex justify-between items-center animate-fade-in";
                    div.innerHTML = `
                        <div class="flex items-center flex-1 overflow-hidden">
                            ${item.image_url ? `<img src="${item.image_url}" onclick="showFullImage('${item.image_url}')" class="w-16 h-16 rounded-2xl object-cover mr-4 border-2 border-white shadow-sm active:scale-95 transition-all">` : `<div class="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center mr-4 text-2xl">📦</div>`}
                            <div class="flex-1 truncate">
                                <div class="font-bold text-gray-800 text-lg leading-tight truncate">${item.name}</div>
                                <div class="text-[10px] text-gray-400 mt-1.5 flex items-center font-bold uppercase"><span class="bg-gray-50 px-2.5 py-1 rounded-full border border-gray-100">📍 ${item.location}</span></div>
                            </div>
                        </div>
                        <div class="text-right ml-3 min-w-[70px]">
                            <div class="${isExpired ? 'text-red-500 font-black' : 'text-gray-500 font-bold'} text-[11px]">${item.expiry || '∞ 無到期日'}</div>
                            <button onclick="deleteItem(${item.id})" class="text-[10px] text-gray-300 hover:text-red-500 mt-2 font-bold uppercase transition-colors px-1">刪除</button>
                        </div>`;
                    list.appendChild(div);
                });
            } catch (e) {
                list.innerHTML = `<div class="bg-red-50 p-6 rounded-3xl text-center"><p class="text-red-600 font-bold">連線失敗</p><p class="text-[10px] text-red-400 mt-1">${e.message}</p></div>`;
            }
        }

        function showFullImage(url) {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('modal-img');
            img.src = url;
            modal.classList.remove('hidden');
        }

        async function deleteItem(id) {
            if (!confirm("確定從雲端刪除嗎？")) return;
            try {
                const { error } = await supabaseClient.from('inventory').delete().eq('id', id);
                if (error) throw error;
                fetchInventory();
            } catch (e) {
                alert("刪除失敗：" + e.message);
            }
        }
